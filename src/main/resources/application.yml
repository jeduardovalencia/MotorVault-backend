spring:
  application:
    name: motorvault-backend

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=MotorVaultDB;encrypt=false;trustServerCertificate=true}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:Admin123!}}
    driver-class-name: ${DB_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.SQLServerDialect}

app:
  version: 1.0.0
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:motorvault-dev-secret-key-change-in-production-must-be-at-least-64-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  tomcat:
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

---
spring:
  config:
    activate:
      on-profile: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=MotorVaultDB;encrypt=false;trustServerCertificate=true
    username: sa
    password: Admin123!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

server:
  tomcat:
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.motorvault: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: WARN
    com.motorvault: INFO

app:
  version: ${APP_VERSION:1.0.0}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://motorvault.vercel.app}